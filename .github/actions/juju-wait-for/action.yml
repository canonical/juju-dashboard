name: Juju Wait For
description: Wait for a Juju application, unit or model to reach a specific state.
inputs:
  type:
    description: "The type of resource to wait for"
    required: true
    type: choice
    options:
      - application
      - unit
      - model
  name:
    description: "The name of the resource to wait for"
    required: true
  timeout_minutes:
    description: "Timeout duration in minutes"
    required: false
    default: "5"
  status:
    description: "Expected status for polling. Comma-separated for multiple statuses."
    required: false
    default: "active"

runs:
  using: composite
  steps:
    - name: Wait for Juju resource
      shell: bash
      run: |
        export TYPE='${{ inputs.type }}'
        export NAME='${{ inputs.name }}'
        export TIMEOUT_MINUTES='${{ inputs.timeout_minutes }}'
        export EXPECTED_STATUS='${{ inputs.status }}'
        ./scripts/wait-for
