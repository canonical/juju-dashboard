name: Set up JIMM
description: Set up JIMM with provided configuration.
inputs:
  admin-username:
    required: false
    description: The username to use when logging in as the admin user.
    default: admin
  admin-password:
    required: false
    description: The password to use when logging in as the admin user.
    default: test
  jimm-channel:
    description: The JIMM charm channel to use.
    required: false
    default: 3/edge
  juju-channel:
    description: Channel of Juju to use.
    required: false
    default: 3/stable
outputs:
  jimm-controller-name:
    description: Name of the JIMM workloads controller
    value: ${{ steps.jimm-controller.outputs.name }}
  workloads-controller-public-name:
    description: Name of the JIMM workloads controller
    value: ${{ steps.workloads-controller.outputs.public }}
  workloads-controller-private-name:
    description: Name of the JIMM workloads controller
    value: ${{ steps.workloads-controller.outputs.name }}

runs:
  using: composite
  steps:
    - name: Disable IPv6
      shell: bash
      run: |
        echo "net.ipv6.conf.all.disable_ipv6=1" | sudo tee -a /etc/sysctl.conf
        echo "net.ipv6.conf.default.disable_ipv6=1" | sudo tee -a /etc/sysctl.conf
        echo "net.ipv6.conf.lo.disable_ipv6=1" | sudo tee -a /etc/sysctl.conf
        sudo sysctl -p
    - name: Setup operator environment
      uses: charmed-kubernetes/actions-operator@main
      with:
        channel: 1.35-strict/stable
        juju-channel: ${{ inputs.juju-channel }}
        provider: microk8s
        microk8s-group: snap_microk8s
        microk8s-addons: "hostpath-storage dns ingress host-access metallb:10.64.140.43-10.64.140.49"
    - name: Save JIMM controller name
      id: jimm-controller
      run: echo "name=$CONTROLLER_NAME" >> "$GITHUB_OUTPUT"
      shell: bash
    - name: Set up deps
      shell: bash
      run: |
        sudo snap install yq jaas
        sudo snap install jaas --channel 3/edge
        sudo snap install terraform --classic
    - name: Setup Go
      uses: actions/setup-go@v6
    - name: Checkout IAM repo
      uses: actions/checkout@v6
      with:
        repository: canonical/iam-bundle-integration
        path: iam-bundle-integration
        ref: v1.0.0
    - name: Set up IAM
      shell: bash
      run: |
        cd iam-bundle-integration
        terraform -chdir=examples/tutorial init
        terraform -chdir=examples/tutorial apply -auto-approve
    - name: Switch to IAM model
      shell: bash
      run: |
        juju switch iam
    - name: Wait for IAM - hydra
      uses: ./.github/actions/juju-wait-for
      with:
        type: application
        name: hydra
        timeout_minutes: 10 # Wait a long time for the first app in the model.
    - name: Wait for IAM - kratos
      uses: ./.github/actions/juju-wait-for
      with:
        type: application
        name: kratos
    - name: Switch to IAM core model
      shell: bash
      run: |
        juju switch core
        juju refresh traefik-public --channel=latest/edge
    - name: Wait for IAM - postgresql-k8s
      uses: ./.github/actions/juju-wait-for
      with:
        type: application
        name: postgresql-k8s
        timeout_minutes: 10 # Postgres needs a longer timeout.
    - name: Wait for IAM - self-signed-certificates
      uses: ./.github/actions/juju-wait-for
      with:
        type: application
        name: self-signed-certificates
    - name: Wait for IAM - traefik-public
      uses: ./.github/actions/juju-wait-for
      with:
        type: application
        name: traefik-public
    - name: Update traefik address
      shell: bash
      run: |
        juju config traefik-public external_hostname=$(juju status --format yaml | yq .applications.traefik-public.address)
    - name: Turn off MFA
      shell: bash
      run: |
        juju switch iam
        juju config kratos enforce_mfa=False
    - name: Wait for Kratos
      uses: ./.github/actions/juju-wait-for
      with:
        type: unit
        name: kratos/0
    - name: Create admin user
      shell: bash
      run: |
        IDENTITY_ID=$(juju run --wait=2m --format=json kratos/0 create-admin-account email='${{ inputs.admin-username }}@example.com' password='${{ inputs.admin-password }}' username='${{ inputs.admin-username }}' | yq .kratos/0.results.identity-id)
        SECRET_ID=$(juju add-secret password-secret password=test)
        juju grant-secret password-secret kratos
        juju run --wait=2m kratos/0 reset-password identity-id=$IDENTITY_ID password-secret-id=$SECRET_ID
    - name: Add JIMM model and apps
      shell: bash
      run: |
        juju add-model jimm
        juju deploy juju-jimm-k8s --channel=${{ inputs.jimm-channel }} jimm --config postgres-secret-storage=true
        juju deploy openfga-k8s --channel=edge openfga
        juju deploy postgresql-k8s --channel=16/edge postgresql
        juju deploy traefik-k8s --channel=latest/edge --trust ingress
        juju trust postgresql --scope=cluster
        juju relate jimm admin/iam.oauth-offer
        juju relate jimm admin/core.send-ca-cert
    - name: Wait for Postgres
      uses: ./.github/actions/juju-wait-for
      with:
        type: unit
        name: postgresql/0 # Wait for postgres to prevent issues when relating to other apps: https://github.com/canonical/openfga-operator/issues/25.
    - name: Add JIMM relations
      shell: bash
      run: |
        juju relate jimm:ingress ingress
        juju relate jimm:openfga openfga
        juju relate jimm:database postgresql
    - name: Wait for Postgres (before openfga)
      uses: ./.github/actions/juju-wait-for
      with:
        type: unit
        name: postgresql/0 # Wait for postgres to prevent issues when relating to openfga: https://github.com/canonical/openfga-operator/issues/25.
    - name: Add openfga relation
      shell: bash
      run: juju relate openfga:database postgresql
    - name: Wait for openfga
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 1
        max_attempts: 5 # Retry the wait-for with a short timeout in case it gets stuck and times out. If it fails after multiple tries it's probably a real error.
        command: |
          STATUS=$(juju status --format json | yq .applications.openfga.application-status.current)
          if [ "$STATUS" == "error" ]; then
            # Sometimes the postgresql unit has a PrematureDataAccessError error so remove the relation and try again.
            juju remove-relation openfga:database postgresql
            # The unit will be blocked when it is waiting for the relation
            TYPE=application NAME=openfga TIMEOUT_MINUTES=1 EXPECTED_STATUS=blocked ./scripts/wait-for
            juju relate openfga:database postgresql
          fi
          TYPE=application NAME=openfga TIMEOUT_MINUTES=1 EXPECTED_STATUS=active ./scripts/wait-for
    - name: Add JIMM relations and certs
      shell: bash
      run: |
        juju deploy self-signed-certificates jimm-cert
        juju relate ingress:certificates jimm-cert:certificates
    - name: Configure JIMM
      shell: bash
      run: |
        # Give the user admin permissions so that they can add the workload controller.
        juju config jimm controller-admins="${{ inputs.admin-username }}@example.com"
        juju config jimm uuid=3f4d142b-732e-4e99-80e7-5899b7e67e59
        keypair=$(go run github.com/go-macaroon-bakery/macaroon-bakery/cmd/bakery-keygen/v3@latest)
        juju config jimm public-key=$(echo $keypair | yq .public )
        juju config jimm private-key=$(echo $keypair | yq .private )
    - name: Wait for ingress
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 1
        max_attempts: 5 # Retry the wait-for with a short timeout in case it gets stuck and times out. If it fails after multiple tries it's probably a real error.
        command: |
          STATUS=$(juju status --format json | yq .applications.ingress.application-status.current)
          if [ "$STATUS" == "error" ]; then
            # Sometimes the ingress unit will get into an error state, so resolve and try again.
            juju resolved ingress/0
          fi
          TYPE=unit NAME=ingress/0 TIMEOUT_MINUTES=1 EXPECTED_STATUS=active ./scripts/wait-for
    - name: Set up ingress hostname and certs
      shell: bash
      run: |
        # Get the metallb IP assigned to ingress
        ingress_status=$(juju status --format json | yq '.applications.ingress.units."ingress/0"."workload-status".message')
        metallb_ip=$(echo $ingress_status | cut -d' ' -f3 | cut -d'/' -f3)
        # Create a DNS entry for jimm in your multipass VM.
        echo "$metallb_ip test-jimm.local" | sudo tee -a /etc/hosts
    - name: Configure hostname
      shell: bash
      run: |
        juju config jimm dns-name=test-jimm.local
        juju config ingress external_hostname=test-jimm.local
        # juju config jimm juju-dashboard-location="http://test-jimm.local/auth/whoami"
    - name: Update certs
      shell: bash
      run: |
        juju run jimm-cert/0 get-ca-certificate --quiet | yq .ca-certificate | sudo tee /usr/local/share/ca-certificates/jimm-test.crt
        sudo update-ca-certificates --fresh
    - name: Wait for jimm
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 4
        max_attempts: 5 # Retry the wait-for with a short timeout in case it gets stuck and times out. If it fails after multiple tries it's probably a real error.
        command: |
          # STATUS=$(juju status --format json | yq .applications.jimm.application-status.current)
          # if [ "$STATUS" == "error" ]; then
          #   juju resolved jimm/0
          #   # Fix for IAM IP address changing: https://documentation.ubuntu.com/jaas/v3/tutorial/#jimm-can-t-communicate-with-the-identity-platform
          #   juju status
          #   juju switch core
          #   juju status
          #   juju config traefik-public external_hostname=$(juju status --format yaml | yq .applications.traefik-public.address)
          #   # juju status --format yaml | yq .applications.traefik-public.address
          #   # juju remove-relation self-signed-certificates traefik-public
          #   # # todo check for relation to be removed
          #   # sleep 100s
          #   # juju relate traefik-public:certificates self-signed-certificates:certificates
          #   # TYPE=application NAME=traefik-public TIMEOUT_MINUTES=1 EXPECTED_STATUS=active ./scripts/wait-for
          #   juju switch jimm
          #   # juju resolved jimm/0
          # fi
          TYPE=application NAME=jimm TIMEOUT_MINUTES=1 EXPECTED_STATUS=active ./scripts/wait-for
    - name: Bootstrap workloads controller
      id: workloads-controller
      shell: bash
      run: |
        sudo microk8s config | juju add-k8s jimm-k8s --cluster-name microk8s-cluster --client
        WORKLOADS_NAME=workload-microk8s
        sg snap_microk8s -c "juju bootstrap jimm-k8s $WORKLOADS_NAME --config login-token-refresh-url=http://jimm-endpoints.jimm.svc.cluster.local:8080/.well-known/jwks.json"
        echo "name=$WORKLOADS_NAME" >> $GITHUB_OUTPUT
        # Set the name that the workloads controller will be registered as.
        echo "public=jimm-k8s" >> $GITHUB_OUTPUT
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: "yarn"
    - name: Set up Playwright
      uses: ./.github/actions/run-playwright
      with:
        run: false
    - name: Log in to JIMM with Juju CLI
      shell: bash
      run: npx tsx .github/actions/setup-jimm/cli-login.ts
      env:
        CONTROLLER_NAME: ${{ steps.workloads-controller.outputs.public }}
        USERNAME: ${{ inputs.admin-username }}@example.com
        PASSWORD: ${{ inputs.admin-password }}
    - name: Register workload controller with JIMM
      shell: bash
      run: |
        juju jaas register-controller '${{ steps.workloads-controller.outputs.name }}' --local --tls-hostname juju-apiserver
        juju update-credentials microk8s --controller ${{ steps.workloads-controller.outputs.public }}
    - name: Switch to JIMM model
      shell: bash
      run: juju switch '${{ steps.jimm-controller.outputs.name }}:jimm'
    - name: Wait for JIMM
      uses: ./.github/actions/juju-wait-for
      with:
        type: unit
        name: jimm/0
    - name: Restart JIMM
      shell: bash
      run: sudo microk8s kubectl delete pod jimm-0 -n jimm # Fix ListModels issue:
    - name: Wait for JIMM pod to be recreated
      uses: nick-fields/retry@v3
      with:
        timeout_minutes: 1
        max_attempts: 5 # Retry the wait-for with a short timeout in case it gets stuck and times out. If it fails after multiple tries it's probably a real error.
        continue_on_error: true # Sometimes the error persists after a retry but it seems to work anyway.
        command: |
          juju switch '${{ steps.jimm-controller.outputs.name }}:jimm'
          STATUS=$(juju status --format json | yq .applications.jimm.application-status.current)
          if [ "$STATUS" == "error" ]; then
            # Sometimes the jimm unit will get into an error state, so resolve and try again.
            juju resolved jimm/0
          fi
          TYPE=application NAME=jimm TIMEOUT_MINUTES=1 EXPECTED_STATUS=active,error ./scripts/wait-for
